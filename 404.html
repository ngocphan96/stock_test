<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Không tìm thấy trang — Radar danh mục</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
:root{--bg:#161618;--surface:#1f1f22;--line:#2e2e33;--text:#ededed;--muted:#8c8c93;--accent:#6fae9f}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
  min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
.logo{width:48px;height:48px;border-radius:50%;border:2px solid var(--accent);display:grid;place-items:center;color:var(--accent);font-size:22px;margin:0 auto 22px}
h1{font-size:26px;font-weight:700;letter-spacing:-.02em}
p{color:var(--muted);font-size:15px;margin:12px 0 26px}
a{display:inline-block;padding:12px 22px;border-radius:11px;font-weight:600;font-size:14.5px;text-decoration:none}
.solid{background:var(--accent);color:#10211d}
.ghost{border:1px solid var(--line);color:var(--text);margin-left:8px}
</style>
</head>
<body>
<div>
  <div class="logo">◉</div>
  <h1>Không tìm thấy trang này</h1>
  <p>Có thể đường dẫn bị sai. Quay lại để xem demo Radar danh mục.</p>
  <a class="solid" href="menu.html">Tất cả màn hình</a>
  <a class="ghost" href="index.html">Trang giới thiệu</a>
</div>
</body>
</html>
